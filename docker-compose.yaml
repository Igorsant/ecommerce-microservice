services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - payment-service
    networks:
      - ecommerce-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,product_db,order_db,payment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "5432:5432"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    expose:
      - "3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      USER_SERVICE_URL: http://user-service:3002
      JWT_SECRET: dev-secret-change-me
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/auth_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

  user-service:
    build: ./user-service
    ports:
      - "3002:3002"
    # expose:
    #   - "3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/user_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

  product-service:
    build: ./product-service
    expose:
      - "3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/product_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    build: ./order-service
    expose:
      - "3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/order_db
      SECRET_KEY_BASE: secret
      JWT_SECRET: chave_secreta
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

  payment-service:
    build: ./payment-service
    expose:
      - "3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/payment_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

volumes:
  postgres_data:

networks:
  ecommerce-net:
    driver: bridge
